trigger:
  branches:
    include:
      - main

pool:
  name: 'SelfHostedPool'

variables:
  FRONTEND_IP: '20.124.124.0'
  BACKEND_IP: '20.127.17.133'
  MYSQL_FQDN: '20.127.17.133'

steps:
  - bash: |
      sudo apt-get update
      sudo apt-get install -y ansible
      ansible --version
    displayName: 'Install Ansible'

  - task: DownloadSecureFile@1
    name: sshKey
    displayName: 'Download SSH Private Key'
    inputs:
      secureFile: 'id_rsa'

  - bash: |
      mkdir -p ~/.ssh
      cp $(sshKey.secureFilePath) ~/.ssh/id_rsa
      chmod 600 ~/.ssh/id_rsa
    displayName: 'Setup SSH Key'

  - bash: |
      sed -i 's/FRONTEND_IP/$(FRONTEND_IP)/g' ansible/inventory.ini
      sed -i 's/BACKEND_IP/$(BACKEND_IP)/g' ansible/inventory.ini
      sed -i 's/MYSQL_FQDN/$(MYSQL_FQDN)/g' ansible/group_vars/all.yml
    displayName: 'Update Inventory and Variables'

  - bash: |
      ansible-playbook -i ansible/inventory.ini ansible/site.yml \
        --private-key ~/.ssh/id_rsa \
        -u azureuser \
        --ssh-extra-args='-o StrictHostKeyChecking=no'
    displayName: 'Run Ansible Playbook'

  - bash: |
      sleep 10
      HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://$(FRONTEND_IP))
      echo "HTTP Status: $HTTP_STATUS"
      if [ "$HTTP_STATUS" = "200" ]; then
        echo "EpicBook is running successfully!"
      else
        echo "Warning: Got HTTP status $HTTP_STATUS"
      fi
    displayName: 'Verify Nginx is Serving EpicBook'
