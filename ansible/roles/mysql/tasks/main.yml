---
- name: Install MySQL server
  apt:
    name: mysql-server
    state: present
    update_cache: yes

- name: Ensure MySQL is started and enabled
  service:
    name: mysql
    state: started
    enabled: yes

- name: Set MySQL root password
  shell: |
    mysql -u root -e "ALTER USER 'root'@'localhost' IDENTIFIED WITH mysql_native_password BY '{{ db_password }}';"
    mysql -u root -p{{ db_password }} -e "FLUSH PRIVILEGES;"
  args:
    creates: /var/www/.mysql_configured

- name: Create application database
  shell: |
    mysql -u root -p{{ db_password }} -e "CREATE DATABASE IF NOT EXISTS {{ db_name }};"
  
- name: Import database schema
  shell: |
    mysql -u root -p{{ db_password }} {{ db_name }} < {{ app_dest }}/db/BuyTheBook_Schema.sql
  ignore_errors: true

- name: Import author seed data
  shell: |
    mysql -u root -p{{ db_password }} {{ db_name }} < {{ app_dest }}/db/author_seed.sql
  ignore_errors: true

- name: Import book seed data
  shell: |
    mysql -u root -p{{ db_password }} {{ db_name }} < {{ app_dest }}/db/books_seed.sql
  ignore_errors: true

- name: Mark MySQL as configured
  file:
    path: /var/www/.mysql_configured
    state: touch
